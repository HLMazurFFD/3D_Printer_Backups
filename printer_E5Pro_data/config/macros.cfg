
[gcode_macro START_PRINT]
description: Code run at start of print, called by OrcaSlicer
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    
    # Heat bed for probing
    M140 S{BED_TEMP} ; set final bed temp- M140 will home without waiting for bed to reach temp
    #M190 S{BED_TEMP}
    
    # Use absolute coordinates
    G90
    # Home the printer
    #M280 P0 S160 ; BLTouch alarm release
    G4 P100 ; delay for BLTouch
    G28 ; home all axis
    #G29 L0          ; Load UBL mesh values from slot 0.
    #G29 J3           ; Probe 9 points and tilt the mesh to the plane.
    
    M83 # extruder relative mode

    M220 S100 #Reset Feedrate
    M221 S100 #Reset Flowrate
    
  
    M104 S120 ; set temporary nozzle temp to prevent oozing during homing- no waiting , M109 to wait
    #4 S10 ; allow partial nozzle warmup 

    ;G92 E0 ;Reset Extruder
    

    # If you are generating a new bed mesh:
    BED_MESH_CALIBRATE #ADAPTIVE=1  commented out because KAMP doesnt need?
    ## NOTE:    The adaptive meshing feature requires exclude_object     ##
    ##      and may require 'Label Objects' to be enabled in the slicer  ##
    ##           To mesh without it just use BED_MESH_CALIBRATE          ##

    # If you are loading an existing mesh:
    #BED_MESH_PROFILE LOAD=default

    G1 Z2.0 F3000 ;Move Z Axis up
    #;G1 X210.1 Y200 Z2.28 F5000.0 ;Move to start position, raised

    #KAMP smark park
    Smart_Park
    #old purging code
    ;G1 X210.1 Y200 Z0.28 F5000.0 ;Move to start position
    ;G1 X210.1 Y40.0 Z0.28 F1500.0 E20 ;Draw the first line
    ;G1 X210.4 Y40.0 Z0.28 F5000.0 ;Move to side a little
    ;G1 X210.4 Y200 Z0.28 F1500.0 E30 ;Draw the second line

    ;G10 ; Retract
    ;G1 X209 Y200 Z0.5 F5000.0 ; Move a little bit more to mitigate stringing

    ;G1 Z2.0 F3000 ;Move Z Axis up
    ;G11; Unretract

    G92 E0 ;Reset Extruder
    # Move the nozzle near the bed
    #G1 Z5 F3000
    M104 S{EXTRUDER_TEMP} ; set final nozzle temp
    M190 S{BED_TEMP} ; wait for bed temp to stabilize
    M109 S{EXTRUDER_TEMP} # Set and wait for nozzle to reach printing temperature

    #KAMP adaptive purge
    Line_Purge
    # Start printing!


[gcode_macro END_PRINT]
gcode:
    # Move nozzle away from print while retracting
    G91 ;Relative positioning
    G10 ; Retract
    G1 Z0.2 ;Raise Z 
    G10 ; Retract
    # Turn off bed, extruder
    M140 S0
    M104 S0
    
    

    M107 S0 #fan off
    # Raise nozzle by 10mm
    G1 Z5 F3000
    G90 ;Absolute positioning
    #{if max_layer_z < printable_height}G1 Z{min(max_layer_z+2, printable_height)} F600 ; Move print head up{endif}
     {% set x_pahk = printer.toolhead.axis_maximum.x|float - 10.0 %}
     {% set y_pahk = printer.toolhead.axis_maximum.y|float - 10.0 %}

    
    G1 X{x_pahk} Y{y_pahk} F6000
    #G1 X{print_bed_max[1]-10} Y{print_bed_max[1]-10} F{travel_speed*60} ; present print
    #{if max_layer_z < printable_height-10}G1 Z{min(max_layer_z+70, printable_height-10)} F600 ; Move print head further up{endif}
    #{if max_layer_z < printable_height*0.6}G1 Z{printable_height*0.6} F600 ; Move print head further up{endif}
    #G1 Z+50
    G91 #relative positioning
    {% set endmax_z = printer.toolhead.axis_maximum.z|float %}
    {% set endact_z = printer.toolhead.position.z|float %}
    {% if endact_z < (endmax_z - 50.0) %}
      {% set z_endsafe = 50.0 %}
    {% else %}
      {% set z_endsafe = endmax_z - endact_z %}
    {% endif %}
    G1 Z{z_endsafe} F900
   
    {endif}

    G90
    #G10 ; Retract
    # Disable steppers
    M84 X Y E ; disable motors













[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
# change this if you need more or less extrusion
variable_extrude: 1.0
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg
  {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
      {% set z_safe = 2.0 %}
  {% else %}
      {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %} 

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}  
  RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE


